name: Deploy to Aliyun Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.ALIYUN_PORT || 22 }} ${{ secrets.ALIYUN_HOST }} >> ~/.ssh/known_hosts

      - name: Pull, build and restart on server
        run: |
          ssh -p ${{ secrets.ALIYUN_PORT || 22 }} \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} << 'EOF'
            set -e
            cd /home/project/ai_exploration
            git pull

            # ── Frontend ──────────────────────────────────────
            cd ulysses-note
            npm ci
            npm run build
            mkdir -p /var/www/ulysses-note
            cp -r dist/. /var/www/ulysses-note/

            # ── Backend ───────────────────────────────────────
            cd server
            npm ci
            npm run build

            if ! command -v pm2 &>/dev/null; then
              npm install -g pm2
            fi

            mkdir -p /home/project/ulysses-note-data

            pm2 describe ulysses-note-server > /dev/null 2>&1 \
              && pm2 restart ulysses-note-server \
              || pm2 start dist/index.js \
                   --name ulysses-note-server \
                   --env production
            pm2 save

            # ── Nginx (update proxy port once if needed) ──────
            sed -i 's|proxy_pass http://127.0.0.1:3000|proxy_pass http://127.0.0.1:3001|g' \
              /etc/nginx/conf.d/*.conf 2>/dev/null || true
            nginx -t && nginx -s reload

            echo "✅ Deploy completed at $(date)"
          EOF
