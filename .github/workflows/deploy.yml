name: Deploy to Aliyun Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ALIYUN_SSH_KEY }}

      - name: SSH into server and pull latest code
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.ALIYUN_PORT || 22 }} \
            ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} \
            "cd /home/project/ai_exploration && git pull && echo '✅ Deploy completed at $(date)'"
